{% extends 'base.html' %} {% block title %} Polls {% endblock title %} 
{% block base %} {% if latest_question_list %}
<div
  class="d-flex flex-column flex-md-row p-4 gap-4 py-md-5 align-items-center justify-content-center"
>
  <div class="list-group">
    <!-- <button type="button" class="btn btn-info">create question</button> <br /> -->
    {% for question in latest_question_list %}
    <a
      href="{% url 'apps.polls:polls-detail' question.id %}"
      class="list-group-item list-group-item-action d-flex gap-3 py-3"
      aria-current="true"
    >
      <img
        src="https://github.com/twbs.png"
        alt="twbs"
        width="32"
        height="32"
        class="rounded-circle flex-shrink-0"
      />
      <div class="d-flex gap-2 w-100 justify-content-between">
        <div>
          <h6 class="mb-0">{{ question.question_text }}</h6>
          <!-- <p class="mb-0 opacity-75">Some placeholder content in a paragraph.</p> -->
        </div>
        <!-- <small class="opacity-50 text-nowrap">now</small> -->
      </div>
    </a>
    {% endfor %}
  </div>
</div>
{% endif %} {% endblock base %}
